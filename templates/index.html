<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Генератор документов с статусами</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 150px; padding: 10px; font-size: 14px; box-sizing: border-box; }
        select, button { padding: 10px 15px; margin-top: 10px; font-size: 16px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; transition: background 0.3s; }
        button:hover:not(:disabled) { background: #0056b3; }
        button:disabled { background: #6c757d; cursor: not-allowed; }
        .note { margin-top: 20px; font-size: 12px; color: #666; }
        .status-panel { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 5px; font-family: monospace; min-height: 100px; max-height: 300px; overflow-y: auto; }
        .status-line { padding: 5px 0; border-bottom: 1px solid #ddd; font-size: 14px; }
        .status-error { color: red; font-weight: bold; }
        .status-ready { color: green; font-weight: bold; }
        .loader { display: inline-block; width: 20px; height: 20px; border: 2px solid #ccc; border-top: 2px solid #007bff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <h1>📄 Генератор документов через Ollama Cloud</h1>
    <p><strong>Модель:</strong> qwen3-coder:480b (с автоматической очисткой диска)</p>
    <form id="generateForm">
        <label>Опишите содержимое документа:</label><br>
        <textarea name="query" id="query" required placeholder="Например: договор передачи квартиры между Ивановым и Петровым, адрес, сумма, подписи"></textarea><br>
        <label>Формат:</label>
        <select name="format" id="format">
            <option value="txt">Text (.txt)</option>
            <option value="docx">Word (.docx)</option>
            <option value="pdf">PDF (.pdf)</option>
            <option value="xlsx">Excel (.xlsx)</option>
            <option value="csv">CSV (.csv)</option>
        </select><br>
        <button type="submit" id="submitBtn">🚀 Сгенерировать и скачать</button>
    </form>

    <div id="statusPanel" class="status-panel">
        <div class="status-line">✨ Готов к работе</div>
    </div>
    <div class="note">⚡ Статусы обновляются в реальном времени. После готовности файл скачается автоматически.</div>
</div>

<script>
    const form = document.getElementById('generateForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusPanel = document.getElementById('statusPanel');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        statusPanel.innerHTML = '<div class="status-line"><span class="loader"></span> Инициализация...</div>';

        const formData = new FormData(form);

        try {
            const response = await fetch('/generate-stream', {
                method: 'POST',
                body: formData
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n\n');
                buffer = lines.pop();

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const data = JSON.parse(line.slice(6));
                            addStatus(data);
                            if (data.status === 'ready' && data.file_url) {
                                const a = document.createElement('a');
                                a.href = data.file_url;
                                a.download = '';
                                document.body.appendChild(a);
                                a.click();
                                a.remove();
                                addStatus({ status: 'info', message: '📥 Скачивание началось...' });
                                setTimeout(() => submitBtn.disabled = false, 2000);
                            }
                            if (data.status === 'error') {
                                submitBtn.disabled = false;
                            }
                        } catch (e) {
                            console.error('JSON parse error', e);
                        }
                    }
                }
            }
        } catch (err) {
            addStatus({ status: 'error', message: 'Сетевая ошибка: ' + err.message });
            submitBtn.disabled = false;
        }
    });

    function addStatus(data) {
        const statusDiv = document.createElement('div');
        statusDiv.className = 'status-line';
        if (data.status === 'error') statusDiv.classList.add('status-error');
        if (data.status === 'ready') statusDiv.classList.add('status-ready');
        let icon = '';
        if (data.status === 'info') icon = '⏳ ';
        if (data.status === 'error') icon = '❌ ';
        if (data.status === 'ready') icon = '✅ ';
        statusDiv.innerHTML = icon + data.message;
        statusPanel.appendChild(statusDiv);
        statusPanel.scrollTop = statusPanel.scrollHeight;
    }
</script>
</body>
</html>
